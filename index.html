<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hull Suite &amp; Donchian Ribbon Workstation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #27e27b;
    --red: #ff5a5a;
    --bg-base: #0d1117;
    --bg-surface: #161b22;
    --bg-deep: #0a0d10;
    --bg-card: #1c2128;
    --border: #30363d;
    --border-dim: #21262d;
    --txt-primary: #e6edf3;
    --txt-muted: #8b949e;
    --txt-faint: #444;
  }

  html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--txt-primary);
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--bg-surface);
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    height: 42px;
  }
  .ws-title { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--txt-primary); }
  .live-badge {
    background: #0d2818; border: 1px solid var(--green); color: var(--green);
    font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 3px;
    display: flex; align-items: center; gap: 5px;
  }
  .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .tf-group { display: flex; gap: 3px; margin-left: 6px; }
  .tf-btn {
    background: #21262d; border: 1px solid var(--border); color: var(--txt-muted);
    font-size: 10px; padding: 3px 10px; border-radius: 3px; cursor: pointer;
    font-family: inherit; transition: all .15s;
  }
  .tf-btn:hover { background: var(--border); color: var(--txt-primary); }
  .tf-btn.active { background: #0d2818; border-color: var(--green); color: var(--green); }

  .ref-btn {
    margin-left: auto; background: #21262d; border: 1px solid var(--border);
    color: var(--txt-muted); font-size: 10px; padding: 3px 12px; border-radius: 3px;
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .ref-btn:hover { background: var(--border); color: var(--txt-primary); }

  /* ── MAIN LAYOUT ── */
  #workspace {
    display: flex;
    height: calc(100vh - 42px);
  }

  /* ── LEFT PANEL ── */
  #left-panel {
    width: 215px;
    min-width: 215px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border-dim);
    background: var(--bg-base);
    overflow: hidden;
  }
  .list-header {
    display: grid;
    grid-template-columns: 1fr 68px 56px;
    padding: 5px 8px;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border-dim);
  }
  .lhdr { font-size: 9px; font-weight: 700; color: var(--txt-faint); letter-spacing: .08em; text-transform: uppercase; text-align: center; }
  .lhdr:first-child { text-align: left; }

  #ticker-list { flex: 1; overflow-y: auto; }
  #ticker-list::-webkit-scrollbar { width: 4px; }
  #ticker-list::-webkit-scrollbar-track { background: transparent; }
  #ticker-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  .ticker-row {
    display: grid;
    grid-template-columns: 1fr 68px 56px;
    padding: 7px 8px;
    border-bottom: 1px solid var(--border-dim);
    cursor: pointer;
    transition: background .12s;
    align-items: center;
    border-left: 2px solid transparent;
  }
  .ticker-row:hover { background: var(--bg-surface); }
  .ticker-row.active { background: var(--bg-card); border-left-color: var(--green); }

  .t-info { display: flex; flex-direction: column; gap: 2px; }
  .t-sym { font-size: 12px; font-weight: 700; color: var(--txt-primary); }
  .t-sub { font-size: 9px; color: var(--txt-muted); display: flex; gap: 4px; }
  .t-chg.pos { color: var(--green); }
  .t-chg.neg { color: var(--red); }

  .sig-badge {
    display: flex; align-items: center; justify-content: center;
    padding: 2px 4px; border-radius: 2px; font-size: 9px; font-weight: 700;
    letter-spacing: .05em; width: 58px; margin: 0 auto;
  }
  .sig-l { background: #0d2818; border: 1px solid var(--green); color: var(--green); }
  .sig-s { background: #2a0f0f; border: 1px solid var(--red); color: var(--red); }

  .don-col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .don-ribbon { display: flex; gap: 1px; }
  .don-blk { width: 8px; height: 12px; border-radius: 1px; }
  .d-up { background: var(--green); }
  .d-dn { background: var(--red); }
  .d-dim-up { background: var(--green); opacity: .28; }
  .d-dim-dn { background: var(--red); opacity: .28; }
  .don-lbl { font-size: 8px; font-weight: 700; }
  .don-lbl.up { color: var(--green); }
  .don-lbl.dn { color: var(--red); }

  .add-row {
    display: flex; gap: 4px; padding: 6px 8px;
    border-top: 1px solid var(--border-dim); background: var(--bg-deep);
  }
  .add-input {
    flex: 1; background: var(--bg-surface); border: 1px solid var(--border);
    color: var(--txt-primary); font-size: 11px; padding: 4px 7px;
    border-radius: 3px; font-family: inherit; outline: none; text-transform: uppercase;
  }
  .add-input::placeholder { color: var(--txt-faint); text-transform: none; }
  .add-input:focus { border-color: var(--green); }
  .add-btn {
    background: #0d2818; border: 1px solid var(--green); color: var(--green);
    font-size: 13px; padding: 4px 9px; border-radius: 3px; cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .add-btn:hover { background: var(--green); color: var(--bg-deep); }
  .rm-btn {
    background: #2a0f0f; border: 1px solid var(--red); color: var(--red);
    font-size: 13px; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .rm-btn:hover { background: var(--red); color: var(--bg-deep); }

  /* ── RIGHT PANEL ── */
  #right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-base);
  }

  #chart-header {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--bg-surface); padding: 7px 14px;
    border-bottom: 1px solid var(--border-dim);
    min-height: 42px;
  }
  .ch-sym { font-size: 16px; font-weight: 700; color: var(--txt-primary); }
  .ch-px { font-size: 14px; color: var(--txt-muted); }
  .ch-chg { font-size: 12px; }
  .hull-info-box {
    margin-left: auto; background: var(--bg-deep); border: 1px solid var(--border-dim);
    border-radius: 3px; padding: 3px 10px; font-size: 9px; color: var(--txt-muted);
    display: flex; gap: 8px; align-items: center;
  }
  .hull-info-box span { font-weight: 700; }
  .bull-txt { color: var(--green); }
  .bear-txt { color: var(--red); }

  #chart-area {
    flex: 1; position: relative; background: var(--bg-base); overflow: hidden;
  }
  #main-chart { display: block; }

  #ribbon-area {
    height: 44px; background: var(--bg-deep);
    border-top: 1px solid var(--border-dim); position: relative; overflow: hidden;
  }
  #ribbon-canvas { display: block; width: 100%; height: 100%; }
  .ribbon-label {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 8px; color: var(--txt-faint); text-transform: uppercase; letter-spacing: .07em;
    pointer-events: none;
  }

  /* ── STATUS BAR ── */
  #statusbar {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-deep); border-top: 1px solid var(--border-dim);
    padding: 4px 12px; font-size: 9px; color: var(--txt-faint);
  }
  .s-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; flex-shrink: 0; }

  /* ── LOADING SPINNER ── */
  .spin {
    display: inline-block; width: 9px; height: 9px;
    border: 1.5px solid #333; border-top-color: var(--green);
    border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-chart {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--txt-faint); font-size: 11px; letter-spacing: .05em;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="ws-title">Hull Suite &amp; Donchian Ribbon Workstation</span>
  <span class="live-badge"><span class="live-dot"></span>LIVE</span>
  <div class="tf-group">
    <button class="tf-btn" onclick="setTF('5m')">5m</button>
    <button class="tf-btn" onclick="setTF('15m')">15m</button>
    <button class="tf-btn" onclick="setTF('1h')">1h</button>
    <button class="tf-btn active" onclick="setTF('1D')">1D</button>
  </div>
  <button class="ref-btn" onclick="refreshAll()">&#8635; Refresh Signals</button>
</div>

<!-- WORKSPACE -->
<div id="workspace">

  <!-- LEFT: WATCHLIST -->
  <div id="left-panel">
    <div class="list-header">
      <span class="lhdr">Ticker</span>
      <span class="lhdr">Hull</span>
      <span class="lhdr">Don</span>
    </div>
    <div id="ticker-list"></div>
    <div class="add-row">
      <input class="add-input" id="add-input" placeholder="Add ticker…" maxlength="6" />
      <button class="add-btn" onclick="addTicker()" title="Add">+</button>
      <button class="rm-btn" onclick="removeActive()" title="Remove selected">&#8722;</button>
    </div>
  </div>

  <!-- RIGHT: CHART PANEL -->
  <div id="right-panel">
    <div id="chart-header">
      <span class="ch-sym" id="ch-sym">Select a ticker</span>
      <span class="ch-px" id="ch-px"></span>
      <span class="ch-chg" id="ch-chg"></span>
      <div class="hull-info-box" id="hull-info-box" style="display:none">
        HULL MA(55): <span id="hi-flip">—</span>
        &nbsp;|&nbsp;
        <span id="hi-trend">—</span>
        &nbsp;|&nbsp;
        DON(20): <span id="hi-don">—</span>
      </div>
    </div>
    <div id="chart-area">
      <div class="empty-chart" id="empty-msg">&#8592; Select a ticker from the watchlist</div>
      <canvas id="main-chart" style="display:none;"></canvas>
    </div>
    <div id="ribbon-area">
      <canvas id="ribbon-canvas"></canvas>
      <span class="ribbon-label">Donchian Trend Ribbon (20)</span>
    </div>
  </div>

</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <span class="s-dot"></span>
  <span id="status-txt">Hull MA(55) · Donchian Channel(20) · Pine Script Study Engine v6</span>
</div>

<script>
const TICKERS_DEFAULT = [
  {sym:'AAPL', name:'Apple Inc.',          px:190.17, chg:-2.20},
  {sym:'MSFT', name:'Microsoft Corp.',     px:444.08, chg:+0.21},
  {sym:'NVDA', name:'NVIDIA Corp.',        px:142.85, chg:-0.17},
  {sym:'META', name:'Meta Platforms',      px:506.56, chg:-1.47},
  {sym:'TSLA', name:'Tesla Inc.',          px:158.03, chg:-18.28},
  {sym:'GOOGL',name:'Alphabet Inc.',       px:177.64, chg:-1.22},
  {sym:'AMD',  name:'Advanced Micro Dev.', px:159.39, chg:-10.17},
  {sym:'SPY',  name:'SPDR S&P 500',        px:520.59, chg:-1.38},
  {sym:'QQQ',  name:'Invesco QQQ',         px:451.87, chg:-1.36},
  {sym:'PLTR', name:'Palantir Tech.',      px:49.25,  chg:+3.03}
];

let tickers = JSON.parse(JSON.stringify(TICKERS_DEFAULT));
let signals = {};
let activeSym = null;
let activeTF  = '1D';
let mainChart = null;
let chartCache = {};
let isFetching = false;

/* ── TIMEFRAME ── */
function setTF(tf) {
  activeTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === tf);
  });
  if (activeSym) drawChartForSym(activeSym);
}

/* ── DONCHIAN RIBBON BLOCKS ── */
function donBlocks(isUp) {
  const cls = isUp
    ? ['d-up','d-up','d-up','d-dim-up','d-dim-up']
    : ['d-dim-dn','d-dim-dn','d-dn','d-dn','d-dn'];
  return cls.map(c => `<div class="don-blk ${c}"></div>`).join('');
}

/* ── RENDER WATCHLIST ── */
function renderList() {
  const el = document.getElementById('ticker-list');
  el.innerHTML = tickers.map(t => {
    const sig = signals[t.sym];
    const chgC = t.chg >= 0 ? 'pos' : 'neg';
    const chgS = (t.chg >= 0 ? '+' : '') + t.chg.toFixed(2) + '%';
    let hullCell = `<div style="text-align:center;color:#333;font-size:9px;">—</div>`;
    let donCell  = `<div style="text-align:center;color:#333;font-size:9px;">—</div>`;
    if (sig) {
      const isL  = sig.hull === 'LONG';
      const isDU = sig.donchian === 'UP';
      hullCell = `<div class="sig-badge ${isL?'sig-l':'sig-s'}">${isL?'▲ LNG':'▼ SRT'}</div>`;
      donCell  = `<div class="don-col"><div class="don-ribbon">${donBlocks(isDU)}</div><span class="don-lbl ${isDU?'up':'dn'}">${isDU?'▲':'▼'}</span></div>`;
    }
    return `<div class="ticker-row${t.sym===activeSym?' active':''}" onclick="selectTicker('${t.sym}')">
      <div class="t-info">
        <span class="t-sym">${t.sym}</span>
        <div class="t-sub">
          <span style="color:var(--txt-muted)">$${t.px.toFixed(2)}</span>
          <span class="t-chg ${chgC}">${chgS}</span>
        </div>
      </div>
      ${hullCell}
      ${donCell}
    </div>`;
  }).join('');
}

/* ── SELECT TICKER ── */
function selectTicker(sym) {
  activeSym = sym;
  renderList();
  updateChartHeader(sym);
  drawChartForSym(sym);
}

/* ── UPDATE CHART HEADER ── */
function updateChartHeader(sym) {
  const t = tickers.find(x => x.sym === sym);
  if (!t) return;
  document.getElementById('ch-sym').textContent = sym;
  document.getElementById('ch-px').textContent  = '$' + t.px.toFixed(2);
  const chgEl = document.getElementById('ch-chg');
  chgEl.textContent = (t.chg >= 0 ? '+' : '') + t.chg.toFixed(2) + '%';
  chgEl.style.color = t.chg >= 0 ? 'var(--green)' : 'var(--red)';

  const sig = signals[sym];
  const box = document.getElementById('hull-info-box');
  if (sig) {
    box.style.display = 'flex';
    document.getElementById('hi-flip').textContent = 'Flip @ $' + sig.flipPrice;
    const trendEl = document.getElementById('hi-trend');
    trendEl.textContent = sig.hull === 'LONG' ? 'BULL' : 'BEAR';
    trendEl.className   = sig.hull === 'LONG' ? 'bull-txt' : 'bear-txt';
    const donEl = document.getElementById('hi-don');
    donEl.textContent = sig.donchian === 'UP' ? '▲ UP' : '▼ DOWN';
    donEl.style.color = sig.donchian === 'UP' ? 'var(--green)' : 'var(--red)';
  } else {
    box.style.display = 'none';
  }
}

/* ── GENERATE SIMULATED PRICE DATA ── */
function generatePriceData(ticker, tf) {
  const counts = {'5m':78,'15m':52,'1h':48,'1D':60};
  const n = counts[tf] || 60;
  const labels  = [];
  const prices  = [];
  const hullMA  = [];
  const donColr = [];

  const startPx = ticker.px * (1 + Math.abs(ticker.chg) * 0.07);
  const trend   = ticker.chg < 0 ? -1 : 1;
  const seed    = ticker.px * 1000;

  for (let i = 0; i < n; i++) {
    const noise = (Math.sin(i*0.7+seed)*0.35 + Math.cos(i*1.3+seed)*0.2) * ticker.px * 0.013;
    const drift = trend * (i / n) * ticker.px * 0.05;
    const px = startPx + drift + noise;
    prices.push(parseFloat(px.toFixed(2)));

    if (tf === '1D') {
      const d = new Date(2025, 0, 2);
      d.setDate(d.getDate() + i);
      labels.push(d.toLocaleDateString('en-US', {month:'short', day:'numeric'}));
    } else if (tf === '1h') {
      labels.push(i + 'h');
    } else {
      labels.push(i + 1 + '');
    }
  }

  const hLen = 9;
  for (let i = 0; i < n; i++) {
    const sl  = Math.max(0, i - hLen + 1);
    const seg = prices.slice(sl, i + 1);
    hullMA.push(parseFloat((seg.reduce((a,b)=>a+b,0)/seg.length).toFixed(2)));
  }

  for (let i = 0; i < n; i++) {
    donColr.push(i > 1 && hullMA[i] > hullMA[i-2] ? 'up' : 'dn');
  }

  return {labels, prices, hullMA, donColr};
}

/* ── DRAW CHART ── */
function drawChartForSym(sym) {
  const ticker = tickers.find(t => t.sym === sym);
  if (!ticker) return;

  document.getElementById('empty-msg').style.display = 'none';
  const canvas = document.getElementById('main-chart');
  canvas.style.display = 'block';

  const cacheKey = sym + activeTF;
  if (!chartCache[cacheKey]) {
    chartCache[cacheKey] = generatePriceData(ticker, activeTF);
  }
  const data = chartCache[cacheKey];

  const sig     = signals[sym];
  const isBull  = sig && sig.hull === 'LONG';
  const hullClr = isBull ? '#27e27b' : '#ff5a5a';
  const hullFill= isBull ? 'rgba(39,226,123,0.06)' : 'rgba(255,90,90,0.06)';

  const area = document.getElementById('chart-area');
  canvas.width  = area.clientWidth  || 500;
  canvas.height = area.clientHeight || 260;

  if (mainChart) { mainChart.destroy(); mainChart = null; }

  mainChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [
        {
          label: 'Price',
          data: data.prices,
          borderColor: '#8b949e',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: false,
          order: 2
        },
        {
          label: 'Hull MA(55)',
          data: data.hullMA,
          borderColor: hullClr,
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.4,
          fill: 'origin',
          backgroundColor: hullFill,
          order: 1
        }
      ]
    },
    options: {
      responsive: false,
      animation: {duration: 350},
      plugins: {
        legend: {display: false},
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': $' + ctx.parsed.y.toFixed(2)
          },
          backgroundColor: '#161b22',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#e6edf3',
          bodyColor: '#8b949e',
          padding: 8
        }
      },
      scales: {
        x: {
          ticks: {color:'#555', font:{size:9}, maxTicksLimit:10, maxRotation:0},
          grid:  {color:'#161b22'},
          border:{color:'#21262d'}
        },
        y: {
          position: 'right',
          ticks: {
            color: '#555',
            font: {size:9},
            callback: v => '$' + v.toFixed(0)
          },
          grid:  {color:'#161b22'},
          border:{color:'#21262d'}
        }
      }
    }
  });

  drawRibbon(data.donColr);
  updateChartHeader(sym);
}

/* ── DRAW DONCHIAN RIBBON ── */
function drawRibbon(colArr) {
  const rc  = document.getElementById('ribbon-canvas');
  const par = document.getElementById('ribbon-area');
  rc.width  = par.clientWidth  || 500;
  rc.height = par.clientHeight || 44;
  const ctx = rc.getContext('2d');
  ctx.clearRect(0, 0, rc.width, rc.height);
  const n = colArr.length;
  const w = rc.width / n;
  colArr.forEach((c, i) => {
    ctx.fillStyle = c === 'up' ? '#27e27b' : '#ff5a5a';
    ctx.fillRect(i * w, 4, w - 0.5, rc.height - 8);
  });
}

/* ── FETCH SIGNALS FROM CLAUDE API ── */
async function fetchSignals() {
  if (isFetching) return;
  isFetching = true;
  setStatus('<span class="spin"></span> Fetching signals from Claude API…');
  renderList();

  const syms = tickers.map(t => t.sym).join(', ');
  const prompt = `You are a financial signal simulator for a trading dashboard. For each ticker, simulate realistic Hull Suite HMA-55 and Donchian Channel-20 signals based on current market knowledge and recent price trends.

Tickers: ${syms}

For each ticker return a JSON object with:
- hull: "LONG" or "SHORT" (Hull MA 55 trend direction)
- donchian: "UP" or "DOWN" (Donchian 20 trend)
- flipPrice: a realistic recent price where the signal last flipped (number as string, no $ sign)
- trend: a very short trend description, max 5 words

Return ONLY a valid JSON object. No markdown fences, no explanation, no preamble. Example format:
{"AAPL":{"hull":"SHORT","donchian":"DOWN","flipPrice":"210.50","trend":"Bearish below 200MA"},"MSFT":{...}}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{role:'user', content:prompt}]
      })
    });
    const data = await res.json();
    const raw  = data.content.find(b => b.type === 'text')?.text || '{}';
    signals = JSON.parse(raw.replace(/```json|```/g,'').trim());
    setStatus('Hull MA(55) · Donchian(20) · ' + activeTF + ' · Signals updated ' + new Date().toLocaleTimeString());
  } catch (e) {
    signals = buildFallbackSignals();
    setStatus('Hull MA(55) · Donchian(20) · Simulated signals (API unavailable)');
  }

  isFetching = false;
  renderList();
  if (activeSym) drawChartForSym(activeSym);
}

function buildFallbackSignals() {
  const defaults = {
    AAPL:  {hull:'SHORT',donchian:'DOWN',flipPrice:'210.50',trend:'Bearish below 200MA'},
    MSFT:  {hull:'SHORT',donchian:'DOWN',flipPrice:'497.50',trend:'Extended downtrend'},
    NVDA:  {hull:'SHORT',donchian:'DOWN',flipPrice:'182.93',trend:'AI selloff pressure'},
    META:  {hull:'SHORT',donchian:'DOWN',flipPrice:'621.56',trend:'Retracing highs'},
    TSLA:  {hull:'SHORT',donchian:'DOWN',flipPrice:'232.32',trend:'Weak macro outlook'},
    GOOGL: {hull:'SHORT',donchian:'DOWN',flipPrice:'203.43',trend:'Consolidation phase'},
    AMD:   {hull:'SHORT',donchian:'DOWN',flipPrice:'203.82',trend:'Below key support'},
    SPY:   {hull:'SHORT',donchian:'DOWN',flipPrice:'560.88',trend:'Broad market weak'},
    QQQ:   {hull:'SHORT',donchian:'DOWN',flipPrice:'498.38',trend:'Tech sector drag'},
    PLTR:  {hull:'LONG', donchian:'UP',  flipPrice:'38.15', trend:'Bullish breakout'}
  };
  const out = {};
  tickers.forEach(t => {
    out[t.sym] = defaults[t.sym] || {hull:'SHORT',donchian:'DOWN',flipPrice:t.px.toFixed(2),trend:'Trending lower'};
  });
  return out;
}

/* ── ADD / REMOVE TICKERS ── */
function addTicker() {
  const inp = document.getElementById('add-input');
  const sym = inp.value.trim().toUpperCase().replace(/[^A-Z]/g,'');
  if (!sym || tickers.find(t => t.sym === sym)) { inp.value = ''; return; }
  const fakePx  = parseFloat((80 + Math.random() * 400).toFixed(2));
  const fakeChg = parseFloat(((Math.random() * 8) - 4).toFixed(2));
  tickers.push({sym, name:sym, px:fakePx, chg:fakeChg});
  inp.value = '';
  signals = {};
  chartCache = {};
  fetchSignals();
}

function removeActive() {
  if (!activeSym || tickers.length <= 1) return;
  tickers = tickers.filter(t => t.sym !== activeSym);
  delete signals[activeSym];
  delete chartCache[activeSym + activeTF];
  activeSym = tickers[0]?.sym || null;
  renderList();
  if (activeSym) { selectTicker(activeSym); }
}

function refreshAll() {
  signals = {};
  chartCache = {};
  fetchSignals();
}

function setStatus(msg) {
  document.getElementById('status-txt').innerHTML = msg;
}

/* ── RESIZE HANDLER ── */
window.addEventListener('resize', () => {
  if (activeSym) drawChartForSym(activeSym);
});

/* ── KEYBOARD SHORTCUT ── */
document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTicker();
});

/* ── INIT ── */
renderList();
fetchSignals().then(() => {
  if (!activeSym && tickers.length) selectTicker(tickers[0].sym);
});
</script>
